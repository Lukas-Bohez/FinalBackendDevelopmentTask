name: CD

on:
  push:
    branches:
      - main

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
        ports:
          - 2375:2375
    env:
      DOCKER_HOST: tcp://localhost:2375
      DOCKER_TLS_CERTDIR: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test ./final.Tests --no-build --configuration Release

      - name: Integration tests
        run: dotnet test ./final.IntegrationTests --no-build --configuration Release

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push API image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/novadrive-api:latest ./final
          docker push ${{ secrets.DOCKER_USERNAME }}/novadrive-api:latest

      - name: Build and push simulator image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/novadrive-simulator:latest -f ./scripts/simulator.Dockerfile ./scripts
          docker push ${{ secrets.DOCKER_USERNAME }}/novadrive-simulator:latest

      - name: Generate changelog
        id: changelog
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          git log -n 20 --pretty=format:'- %s (%h)' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: NovaDrive Release ${{ github.run_number }}
          body: ${{ steps.changelog.outputs.body }}