name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore ./final/final.csproj
      - name: Build
        run: dotnet build ./final/final.csproj -c Release --no-restore
      - name: Run unit tests
        run: dotnet test ./final.Tests/final.Tests.csproj --no-build --verbosity normal
      - name: Run integration tests
        run: dotnet test ./final.IntegrationTests/final.IntegrationTests.csproj --no-build --verbosity normal
name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release --verbosity minimal

      - name: Run unit tests
        run: dotnet test ./final.Tests --no-build --verbosity normal
