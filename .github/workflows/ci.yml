name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: |
          dotnet restore ./final/final.csproj
          dotnet restore ./final.Tests/final.Tests.csproj
          dotnet restore ./final.IntegrationTests/final.IntegrationTests.csproj

      - name: Build
        run: dotnet build ./final/final.csproj --no-restore --configuration Release --verbosity minimal

      - name: Run unit tests
        run: dotnet test ./final.Tests/final.Tests.csproj --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test ./final.IntegrationTests/final.IntegrationTests.csproj --configuration Release --verbosity normal
